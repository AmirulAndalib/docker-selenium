# README: This is a sample values for chart deployment in K8s cluster started by Docker Desktop
# Chart dependency ingress-nginx is installed together by enabling `ingress.enableWithController`
# Chart dependency keda is installed together by enabling `autoscaling.enable`
# Enabled ingress without hostname, set the subPath `/selenium`. NGINX type LoadBalancer to expose access from `http://localhost/selenium`
global:
  seleniumGrid:
    logLevel: INFO

tls:
  ingress:
    enabled: true

tracing:
  enabled: true

ingress:
  enableWithController: true
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/app-root: &gridAppRoot "/selenium"
  className: nginx
  hostname: ""
  paths:
    - path: /selenium(/|$)(.*)
      pathType: ImplementationSpecific
      backend:
        service:
          name: '{{ ternary (include "seleniumGrid.router.fullname" $ ) (include "seleniumGrid.hub.fullname" $ ) $.Values.isolateComponents }}'
          port:
            number: 4444

basicAuth:
  enabled: false

isolateComponents: true

autoscaling:
  enabled: true
  scalingType: job
  scaledOptions:
    minReplicaCount: 0
    maxReplicaCount: 8
    pollingInterval: 15
  scaledJobOptions:
    successfulJobsHistoryLimit: 0
    failedJobsHistoryLimit: 5
    scalingStrategy:
      strategy: default

hub:
  subPath: *gridAppRoot
  serviceType: NodePort

components:
  router:
    subPath: *gridAppRoot
    serviceType: NodePort

crossBrowsers:
  chromeNode:
    - nameOverride: node-chrome-any
      hpa:
        platformName: ''
    - nameOverride: node-chrome-linux
      hpa:
        platformName: 'Linux'
  firefoxNode:
    - nameOverride: node-firefox-any
      hpa:
        platformName: ''
    - nameOverride: node-firefox-linux
      hpa:
        platformName: 'Linux'
  edgeNode:
    - nameOverride: node-edge-any
      hpa:
        platformName: ''
    - nameOverride: node-edge-linux
      hpa:
        platformName: 'Linux'

chromeNode:
  extraEnvironmentVariables: &extraEnvironmentVariablesNodes
    - name: SE_VNC_NO_PASSWORD
      value: "true"

firefoxNode:
  extraEnvironmentVariables: *extraEnvironmentVariablesNodes

edgeNode:
  extraEnvironmentVariables: *extraEnvironmentVariablesNodes

videoRecorder:
  enabled: true
  extraVolumeMounts:
    - name: videos
      mountPath: /videos
      subPath: videos
  extraVolumes:
    - name: videos
      persistentVolumeClaim:
        claimName: local-pv-storage
  uploader:
    enabled: true
    destinationPrefix: "s3://upload-records-repo/batch01" # Replace this with your own S3 bucket name (and subdirectory if any)
    extraEnvFrom:
      - secretRef:
          name: aws-s3-upload-secret # The external secret contains configs for S3 upload. See steps in README.
#    secrets: # Uncomment the following lines if you want to attach the secret directly from chart values.
#      RCLONE_CONFIG_S3_TYPE: "s3"
#      RCLONE_CONFIG_S3_PROVIDER: "AWS"
#      RCLONE_CONFIG_S3_ENV_AUTH: "true"
#      RCLONE_CONFIG_S3_REGION: "ap-south-1"
#      RCLONE_CONFIG_S3_LOCATION_CONSTRAINT: "ap-south-1"
#      RCLONE_CONFIG_S3_ACL: "private"
#      RCLONE_CONFIG_S3_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID}"
#      RCLONE_CONFIG_S3_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY}"
#      RCLONE_CONFIG_S3_NO_CHECK_BUCKET: "true"

videoManager:
  enabled: true
  extraVolumeMounts:
    - name: videos
      mountPath: /srv
      subPath: videos
  extraVolumes:
    - name: videos
      persistentVolumeClaim:
        claimName: local-pv-storage

ingress-nginx:
  controller:
    hostPort:
      enabled: true
    kind: DaemonSet
    service:
      type: LoadBalancer

customLabels:
  organization: "SeleniumHQ"
  environment: "dev"

